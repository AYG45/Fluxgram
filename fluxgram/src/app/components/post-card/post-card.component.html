<article class="post">
  <header class="post-header">
    <div class="user">
      <a [routerLink]="['/profile', post.username]" class="user-link">
        <img [src]="post.userAvatar" [alt]="post.username" class="avatar">
        <span class="username">{{ post.username }}</span>
      </a>
    </div>
    @if (showDeleteOption && isOwnPost()) {
      <button class="action-btn menu-btn" (click)="toggleMenu()" title="More options">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <circle cx="12" cy="5" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="12" cy="19" r="2"/>
        </svg>
      </button>
      
      @if (showMenu()) {
        <div class="dropdown-menu">
          <button class="menu-item danger" (click)="onDelete()">Delete Post</button>
          <button class="menu-item" (click)="closeMenu()">Cancel</button>
        </div>
      }
    }
  </header>

  <img [src]="post.images[0]" alt="Post image" class="post-image" (click)="onImageClick($event)">

  <div class="post-actions">
    <button class="action-btn" [class.liked]="post.isLiked" (click)="onLike()" title="Like">
      @if (post.isLiked) {
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#ed4956">
          <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z"/>
        </svg>
      }
    </button>
    <a (click)="openPostDetail($event)" class="action-btn" title="Comment" style="cursor: pointer;">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </a>
    <button class="action-btn" title="Share">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
    <button class="action-btn bookmark" (click)="onSave()" title="Save">
      @if (post.isSaved) {
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M20 22a.999.999 0 0 1-.687-.273L12 14.815l-7.313 6.912A1 1 0 0 1 3 21V3a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1Z"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21V3H4v18l8-6Z"/>
        </svg>
      }
    </button>
  </div>

  <div class="post-content">
    <div class="likes">{{ post.likes }} likes</div>
    <div class="caption">
      <a [routerLink]="['/profile', post.username]" class="username-link">{{ post.username }}</a>
      {{ post.caption }}
    </div>
    @if (post.comments > 0) {
      <a (click)="openPostDetail($event)" class="comments-link" style="cursor: pointer;">View all {{ post.comments }} comments</a>
    }
    <span class="timestamp">2 hours ago</span>
  </div>
</article>
