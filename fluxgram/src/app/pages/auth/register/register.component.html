<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="logo">Fluxgram</h1>
      <p class="subtitle">Sign up to see photos and videos from your friends.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      @if (error()) {
        <div class="error-message">{{ error() }}</div>
      }

      <!-- Profile Photo Upload -->
      <div class="photo-upload">
        <label class="photo-upload-label">
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            class="file-input">
          <div class="avatar-container">
            @if (previewUrl) {
              <img [src]="previewUrl" alt="Profile preview" class="avatar-preview">
            } @else {
              <div class="avatar-placeholder">
                <svg class="camera-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </div>
            }
          </div>
          <span class="upload-text">Add Profile Photo</span>
        </label>
      </div>

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        class="input"
        required>

      <input
        type="text"
        placeholder="Full Name"
        [(ngModel)]="fullName"
        name="fullName"
        class="input"
        required>

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
        class="input"
        required>

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        class="input"
        required>

      <button
        type="submit"
        class="btn-primary"
        [disabled]="loading()">
        {{ loading() ? 'Signing up...' : 'Sign up' }}
      </button>
    </form>
  </div>

  <div class="auth-card signup-card">
    <p>
      Have an account?
      <a [routerLink]="['/login']" class="link">Log in</a>
    </p>
  </div>
</div>
